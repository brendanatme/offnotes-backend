components:
  schemas:
    Folder:
      type: object
      description: |-
        Serializer for Folder model.

        Fields:
        - id: Unique identifier (read-only)
        - name: Folder name
        - notes_count: Number of notes in the folder (read-only)
        - created_at: Creation timestamp (read-only)
        - updated_at: Last update timestamp (read-only)
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name of the folder
          maxLength: 100
        notes_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the folder was created
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the folder was last updated
      required:
      - created_at
      - id
      - name
      - notes_count
      - updated_at
    Login:
      type: object
      description: |-
        Serializer for user login.

        Authenticates a user with username and password,
        and returns the authentication token.
      properties:
        username:
          type: string
        password:
          type: string
          writeOnly: true
        token:
          type: string
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
      required:
      - password
      - token
      - user
      - username
    Note:
      type: object
      description: |-
        Serializer for Note model.

        Fields:
        - id: Unique identifier (read-only)
        - folder: Foreign key to the parent folder
        - title: Note title
        - date: Date of the note
        - content: Full content of the note
        - created_at: Creation timestamp (read-only)
        - updated_at: Last update timestamp (read-only)
      properties:
        id:
          type: integer
          readOnly: true
        folder:
          type: integer
          description: The folder this note belongs to
        title:
          type: string
          description: Title of the note
          maxLength: 200
        date:
          type: string
          format: date
          nullable: true
          description: Date associated with the note
        content:
          type: string
          description: Full content/body of the note
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the note was created
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the note was last updated
      required:
      - content
      - created_at
      - folder
      - id
      - title
      - updated_at
    PatchedFolder:
      type: object
      description: |-
        Serializer for Folder model.

        Fields:
        - id: Unique identifier (read-only)
        - name: Folder name
        - notes_count: Number of notes in the folder (read-only)
        - created_at: Creation timestamp (read-only)
        - updated_at: Last update timestamp (read-only)
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: Name of the folder
          maxLength: 100
        notes_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the folder was created
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the folder was last updated
    PatchedNote:
      type: object
      description: |-
        Serializer for Note model.

        Fields:
        - id: Unique identifier (read-only)
        - folder: Foreign key to the parent folder
        - title: Note title
        - date: Date of the note
        - content: Full content of the note
        - created_at: Creation timestamp (read-only)
        - updated_at: Last update timestamp (read-only)
      properties:
        id:
          type: integer
          readOnly: true
        folder:
          type: integer
          description: The folder this note belongs to
        title:
          type: string
          description: Title of the note
          maxLength: 200
        date:
          type: string
          format: date
          nullable: true
          description: Date associated with the note
        content:
          type: string
          description: Full content/body of the note
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the note was created
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the note was last updated
    PatchedUser:
      type: object
      description: |-
        Serializer for the User model.

        Provides a structured representation of user data for API responses.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        password:
          type: string
          writeOnly: true
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
          readOnly: true
    User:
      type: object
      description: |-
        Serializer for the User model.

        Provides a structured representation of user data for API responses.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        password:
          type: string
          writeOnly: true
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - date_joined
      - id
      - password
      - username
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
