  /api/users/login/:
    post:
      operationId: users_login_create
      description: |-
        User login endpoint.

        Authenticates a user with their username and password, and returns
        an authentication token for subsequent API requests.

        Accepts:
        - username (str): The user's username
        - password (str): The user's password

        Returns:
        - token (str): The authentication token for subsequent requests
        - user (dict): The authenticated user's details
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
            examples:
              LoginRequest:
                value:
                  username: john_doe
                  password: secure_password123
                summary: Login Request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - tokenAuth: []
      - tokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
              examples:
                LoginRequest:
                  value:
                    username: john_doe
                    password: secure_password123
                  summary: Login Request
                LoginResponse:
                  value:
                    token: abc123token456
                    user:
                      id: 1
                      username: john_doe
                      email: john@example.com
                      first_name: John
                      last_name: Doe
                      is_active: true
                      date_joined: '2024-01-15T10:30:00Z'
                  summary: Login Response
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Invalid username or password
          description: ''
  /api/users/logout/:
    post:
